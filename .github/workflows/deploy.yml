name: Deploy Momentum + TURBO-GIT shop preview to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          # Set these in repo Settings → Secrets and variables → Actions to
          # enable real payments. Empty = safe demo mode (Pro preview key).
          NEXT_PUBLIC_CHECKOUT_URL: ${{ secrets.NEXT_PUBLIC_CHECKOUT_URL }}
          NEXT_PUBLIC_GUMROAD_PRODUCT_ID: ${{ secrets.NEXT_PUBLIC_GUMROAD_PRODUCT_ID }}

      # ---- TURBO-GIT headless shop preview, nested under /shop ----
      - name: Install shop dependencies
        run: npm ci
        working-directory: turbo-git-shop

      - name: Build shop (preview)
        run: npm run build
        working-directory: turbo-git-shop
        env:
          NODE_ENV: production
          SHOP_BASE_PATH: /chatbot/shop

      - name: Nest shop under /shop
        run: cp -r turbo-git-shop/out out/shop

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
