name: Deploy turbo-git-shop to GitHub Pages

on:
  push:
    branches: [main]
    paths: ["turbo-git-shop/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-shop"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: turbo-git-shop/package-lock.json
      - run: npm ci
        working-directory: turbo-git-shop
      - run: npm run build
        working-directory: turbo-git-shop
        env:
          NODE_ENV: production
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./turbo-git-shop/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
